{% extends "base.html" %}

{% block content %}
  <main>
    <div class="py-5 text-center">
        &nbsp;
    </div>

    <div class="row g-5">
        <div class="col">

        <form id="addForm">
        <div class="row">
            <div class="col">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control needs-validation" id="username" aria-describedby="usernameHelp" required>
                    <div class="invalid-feedback">This field is required.</div>
                </div>
            </div>

            <div class="col">
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="text" class="form-control needs-validation" id="password" aria-describedby="passwordHelp" required>
                    <div class="invalid-feedback">This field is required.</div>
                </div>      
            </div>

            <div class="col">
                <div class="mt-4">
                    <button 
                    id="addButton" 
                    class="btn btn-primary" 
                    type="button" 
                    disabled
                    aria-disabled="true">Add</button>
                </div>
            </div>
        </form>
        </div>
          
        </div> <!-- col -->
    </div><!-- row -->

    <div class="row g-5">
        <div class="col">
        <table class="table">
        <thead>
        <tr>
            <td>Username</td>
            <td>Edit</td>
            <td>Delete</td>
        </tr>
        </thead>
        <tbody>
        </tbody>
        </table>
        </div> <!-- col -->
    </div><!-- row -->

  </main>

{% endblock %}


{% block js %}
    <!-- local imports -->
    <script type="text/javascript" src="{{rootUrl}}/static/js/libs/d3.v6.min.js"></script>
    <script type="text/javascript" src="{{rootUrl}}/static/js/libs/autocomplete.js"></script>
    <script type="text/javascript" src="{{rootUrl}}/static/js/log.js"></script>
    <script type="text/javascript">
      const categories = [];
      //{% for c in categories %}
      //categories.push("{{ c.name }}");
      //{% endfor %}
    </script>
{% endblock %}
